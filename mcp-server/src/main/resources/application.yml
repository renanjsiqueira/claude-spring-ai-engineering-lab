spring:
  main:
    # STDIO transport uses stdout for the protocol — no web server, no banner.
    web-application-type: none
    banner-mode: "off"
  ai:
    mcp:
      server:
        name: claudelab-mcp-server
        version: 0.0.1
        type: SYNC
        stdio: true
        annotation-scanner:
          enabled: true

# Keep stdout clean for the MCP protocol: log to a file, not the console.
logging:
  file:
    name: mcp-server.log
  pattern:
    console: ""

claudelab:
  mcp:
    # Resolved relative to the mcp-server module dir (where you run it from).
    knowledge-base-dir: ../docs/knowledge-base
